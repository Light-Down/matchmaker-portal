name: Supabase

on:
  pull_request:
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"

jobs:
  migrations:
    name: Database migrations
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Check pending migrations
        if: github.event_name == 'pull_request'
        run: supabase db push --dry-run --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        if: github.event_name == 'push'
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes
